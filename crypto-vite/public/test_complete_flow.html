        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .step { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { background: #0056b3; }
        .btn.success { background: #28a745; }
        .btn.danger { background: #dc3545; }
        .result { margin: 10px 0; padding: 10px; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .code { background: #f8f9fa; padding: 10px; border-radius: 3px; font-family: monospace; }
    </style>

        <div class="step">

            <button onclick="loginAdmin()" class="btn success">Login as Admin</button>
            <button onclick="checkAuth()" class="btn">Check Auth Status</button>
            <div id="auth-result" class="result"></div>
        </div>
        
        <div class="step">
            <h3>Step 3: Test Dashboard API</h3>
            <button onclick="testDashboard()" class="btn">Test Dashboard API</button>
            <div id="dashboard-result" class="result"></div>
        </div>
        
        <div class="step">
            <h3>Step 4: Open Admin Dashboard</h3>
            <a href="http://localhost:5174/admin" target="_blank" class="btn success">Open Admin Dashboard</a>
            <div class="info">
                <strong>Expected:</strong> Dashboard should load with real data and no errors in console
            </div>
        </div>
        
        <div class="step">
            <h3>Debug Tools</h3>
            <button onclick="clearStorage()" class="btn danger">Clear Storage</button>
            <button onclick="runAllTests()" class="btn success">Run All Tests</button>
        </div>
    </div>
