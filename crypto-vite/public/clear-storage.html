<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Storage - NEXUS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
            border-radius: 4px;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        .storage-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .storage-info h4 {
            color: #856404;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .storage-item {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #333;
            text-align: left;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear Storage</h1>
        <p class="subtitle">NEXUS Crypto Exchange</p>

        <div class="info-box">
            <h3>What does this do?</h3>
            <p>This tool clears all stored authentication data from your browser's localStorage. Use this if you're experiencing login issues or need to reset your session.</p>
        </div>

        <div class="storage-info" id="storageInfo">
            <h4>Current Storage:</h4>
            <div id="storageItems"></div>
        </div>

        <button class="btn" onclick="refreshStorage()">🔄 Refresh</button>
        <button class="btn btn-danger" onclick="clearStorage()">🗑️ Clear All Storage</button>
        <button class="btn btn-secondary" onclick="clearAuthOnly()">🔑 Clear Auth Token Only</button>

        <div class="success-message" id="successMessage">
            ✅ Storage cleared successfully!
        </div>

        <a href="/login" class="link">← Back to Login</a>
    </div>

    <script>
        function displayStorage() {
            const storageItems = document.getElementById('storageItems');
            storageItems.innerHTML = '';

            if (localStorage.length === 0) {
                storageItems.innerHTML = '<div class="storage-item">No items in storage</div>';
                return;
            }

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                const truncatedValue = value.length > 50 ? value.substring(0, 50) + '...' : value;
                
                const item = document.createElement('div');
                item.className = 'storage-item';
                item.textContent = `${key}: ${truncatedValue}`;
                storageItems.appendChild(item);
            }
        }

        function clearStorage() {
            if (confirm('Are you sure you want to clear ALL storage? This will log you out.')) {
                localStorage.clear();
                showSuccess();
                displayStorage();
            }
        }

        function clearAuthOnly() {
            if (confirm('Clear authentication token? This will log you out.')) {
                localStorage.removeItem('auth_token');
                showSuccess();
                displayStorage();
            }
        }

        function refreshStorage() {
            displayStorage();
        }

        function showSuccess() {
            const message = document.getElementById('successMessage');
            message.classList.add('show');
            setTimeout(() => {
                message.classList.remove('show');
            }, 3000);
        }

        // Display storage on load
        displayStorage();
    </script>
</body>
</html>
