<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification & OTP Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #00e5cc, #00b4d8);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .test-section h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00e5cc;
            box-shadow: 0 0 0 3px rgba(0, 229, 204, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #00e5cc, #00b4d8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 229, 204, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.success {
            background: #28a745;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .status-indicator.pending {
            background: #ffc107;
        }

        .otp-input {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            max-width: 200px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #00e5cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Email Verification & OTP Test</h1>
            <p>Test the email verification and OTP system functionality</p>
        </div>

        <div class="content">
            <!-- Authentication Section -->
            <div class="test-section">
                <h3>🔐 Authentication</h3>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" value="ashenafiashew074@gmail.com" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" value="password123" placeholder="Enter your password">
                </div>
                <button class="btn" onclick="register()">Register</button>
                <button class="btn btn-secondary" onclick="login()">Login</button>
                <div id="authResult" class="result" style="display: none;"></div>
            </div>

            <!-- Email Verification Section -->
            <div class="test-section">
                <h3>📧 Email Verification</h3>
                <button class="btn" onclick="checkEmailStatus()">Check Status</button>
                <button class="btn" onclick="sendEmailVerification()">Send Verification Email</button>
                <div id="emailResult" class="result" style="display: none;"></div>
            </div>

            <!-- OTP Section -->
            <div class="test-section">
                <h3>🔐 OTP Verification</h3>
                <div class="form-group">
                    <label>OTP Purpose:</label>
                    <select id="otpPurpose">
                        <option value="email_verification">Email Verification</option>
                        <option value="login">Login</option>
                        <option value="password_reset">Password Reset</option>
                        <option value="transaction">Transaction</option>
                    </select>
                </div>
                <button class="btn" onclick="generateOtp()">Generate OTP</button>
                <button class="btn btn-secondary" onclick="checkOtpStatus()">Check OTP Status</button>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>Enter OTP Code:</label>
                    <input type="text" id="otpCode" class="otp-input" maxlength="6" placeholder="000000">
                </div>
                <button class="btn" onclick="verifyOtp()">Verify OTP</button>
                <div id="otpResult" class="result" style="display: none;"></div>
            </div>

            <!-- System Status -->
            <div class="test-section">
                <h3>📊 System Status</h3>
                <div id="systemStatus">
                    <p><span class="status-indicator pending"></span>Authentication: Not tested</p>
                    <p><span class="status-indicator pending"></span>Email Verification: Not tested</p>
                    <p><span class="status-indicator pending"></span>OTP System: Not tested</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let authToken = localStorage.getItem('test_token');

        // Update system status
        function updateStatus(system, status) {
            const statusElement = document.querySelector(`#systemStatus p:nth-child(${system}) .status-indicator`);
            statusElement.className = `status-indicator ${status}`;
        }

        // Show result
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `result ${type}`;
            element.style.display = 'block';
        }

        // Make API request
        async function makeRequest(method, endpoint, data = null) {
            const url = `${API_BASE}${endpoint}`;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            };

            if (authToken) {
                options.headers['Authorization'] = `Bearer ${authToken}`;
            }

            if (data) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                
                return {
                    success: response.ok,
                    status: response.status,
                    data: result
                };
            } catch (error) {
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        // Authentication functions
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showResult('authResult', 'Please enter email and password', 'error');
                return;
            }

            showResult('authResult', 'Registering user...', 'info');

            const response = await makeRequest('POST', '/auth/register', {
                name: 'Test User',
                email,
                password,
                password_confirmation: password
            });

            if (response.success) {
                authToken = response.data.data?.token;
                if (authToken) {
                    localStorage.setItem('test_token', authToken);
                }
                showResult('authResult', `Registration successful!\nToken: ${authToken ? authToken.substring(0, 20) + '...' : 'None'}`, 'success');
                updateStatus(1, 'success');
            } else {
                showResult('authResult', `Registration failed: ${response.data.message || response.error}`, 'error');
                updateStatus(1, 'error');
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showResult('authResult', 'Please enter email and password', 'error');
                return;
            }

            showResult('authResult', 'Logging in...', 'info');

            const response = await makeRequest('POST', '/auth/login', {
                email,
                password
            });

            if (response.success) {
                authToken = response.data.data?.token;
                if (authToken) {
                    localStorage.setItem('test_token', authToken);
                }
                showResult('authResult', `Login successful!\nToken: ${authToken ? authToken.substring(0, 20) + '...' : 'None'}`, 'success');
                updateStatus(1, 'success');
            } else {
                showResult('authResult', `Login failed: ${response.data.message || response.error}`, 'error');
                updateStatus(1, 'error');
            }
        }

        // Email verification functions
        async function checkEmailStatus() {
            if (!authToken) {
                showResult('emailResult', 'Please login first', 'error');
                return;
            }

            showResult('emailResult', 'Checking email verification status...', 'info');

            const response = await makeRequest('GET', '/auth/email-verification-status');

            if (response.success) {
                const data = response.data.data;
                const status = `Email Verification Status:
- Is Verified: ${data.is_verified ? 'Yes' : 'No'}
- Can Resend: ${data.can_resend ? 'Yes' : 'No'}
- Attempts Remaining: ${data.attempts_remaining || 'N/A'}
- Last Sent: ${data.verification_sent_at || 'Never'}`;
                
                showResult('emailResult', status, data.is_verified ? 'success' : 'info');
                updateStatus(2, data.is_verified ? 'success' : 'pending');
            } else {
                showResult('emailResult', `Failed to check status: ${response.data.message || response.error}`, 'error');
                updateStatus(2, 'error');
            }
        }

        async function sendEmailVerification() {
            if (!authToken) {
                showResult('emailResult', 'Please login first', 'error');
                return;
            }

            showResult('emailResult', 'Sending email verification...', 'info');

            const response = await makeRequest('POST', '/auth/send-email-verification');

            if (response.success) {
                showResult('emailResult', `Email verification sent successfully!\nMessage: ${response.data.message}`, 'success');
                updateStatus(2, 'success');
            } else {
                showResult('emailResult', `Failed to send email: ${response.data.message || response.error}`, 'error');
                updateStatus(2, 'error');
            }
        }

        // OTP functions
        async function generateOtp() {
            if (!authToken) {
                showResult('otpResult', 'Please login first', 'error');
                return;
            }

            const email = document.getElementById('email').value;
            const purpose = document.getElementById('otpPurpose').value;

            showResult('otpResult', 'Generating OTP...', 'info');

            const response = await makeRequest('POST', '/auth/generate-otp', {
                identifier: email,
                type: 'email',
                purpose
            });

            if (response.success) {
                let message = `OTP generated successfully!\nMessage: ${response.data.message}`;
                
                // In development, OTP might be returned
                if (response.data.otp_code) {
                    message += `\nDevelopment OTP: ${response.data.otp_code}`;
                    document.getElementById('otpCode').value = response.data.otp_code;
                }
                
                showResult('otpResult', message, 'success');
                updateStatus(3, 'success');
            } else {
                showResult('otpResult', `Failed to generate OTP: ${response.data.message || response.error}`, 'error');
                updateStatus(3, 'error');
            }
        }

        async function checkOtpStatus() {
            if (!authToken) {
                showResult('otpResult', 'Please login first', 'error');
                return;
            }

            const email = document.getElementById('email').value;
            const purpose = document.getElementById('otpPurpose').value;

            showResult('otpResult', 'Checking OTP status...', 'info');

            const params = new URLSearchParams({
                identifier: email,
                type: 'email',
                purpose
            });

            const response = await makeRequest('GET', `/auth/otp-status?${params}`);

            if (response.success) {
                const data = response.data.data;
                const status = `OTP Status:
- Has Active OTP: ${data.has_active_otp ? 'Yes' : 'No'}
- Can Resend: ${data.can_resend ? 'Yes' : 'No'}
- Attempts Remaining: ${data.attempts_remaining || 'N/A'}
- Expires At: ${data.expires_at || 'N/A'}`;
                
                showResult('otpResult', status, 'info');
            } else {
                showResult('otpResult', `Failed to check OTP status: ${response.data.message || response.error}`, 'error');
            }
        }

        async function verifyOtp() {
            if (!authToken) {
                showResult('otpResult', 'Please login first', 'error');
                return;
            }

            const email = document.getElementById('email').value;
            const otpCode = document.getElementById('otpCode').value;
            const purpose = document.getElementById('otpPurpose').value;

            if (!otpCode || otpCode.length !== 6) {
                showResult('otpResult', 'Please enter a valid 6-digit OTP', 'error');
                return;
            }

            showResult('otpResult', 'Verifying OTP...', 'info');

            const response = await makeRequest('POST', '/auth/verify-otp', {
                identifier: email,
                otp_code: otpCode,
                type: 'email',
                purpose
            });

            if (response.success) {
                showResult('otpResult', `OTP verified successfully!\nMessage: ${response.data.message}`, 'success');
                updateStatus(3, 'success');
                
                // Clear the OTP input
                document.getElementById('otpCode').value = '';
                
                // If this was email verification, update email status
                if (purpose === 'email_verification') {
                    updateStatus(2, 'success');
                }
            } else {
                showResult('otpResult', `OTP verification failed: ${response.data.message || response.error}`, 'error');
            }
        }

        // Auto-fill OTP input with numbers only
        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
        });

        // Initialize
        if (authToken) {
            updateStatus(1, 'success');
        }
    </script>
</body>
</html>
