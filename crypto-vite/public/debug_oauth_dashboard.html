<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Dashboard Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; background: #2a2a2a; border-radius: 8px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196F3; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #333; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .log { height: 300px; overflow-y: auto; background: #333; padding: 10px; border-radius: 4px; font-family: monospace; }
        input { padding: 8px; margin: 5px; border: 1px solid #555; background: #333; color: #fff; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 OAuth Dashboard Debug Tool</h1>
        
        <div class="section">
            <h2>1. Current Authentication Status</h2>
            <div id="auth-status"></div>
            <button onclick="checkAuthStatus()">Check Auth Status</button>
            <button onclick="clearAuth()">Clear Auth</button>
        </div>

        <div class="section">
            <h2>2. Test OAuth Callback</h2>
            <p>Simulate OAuth callback with test data:</p>
            <button onclick="simulateOAuthCallback()">Simulate OAuth Success</button>
            <button onclick="simulateAdminCallback()">Simulate Admin OAuth</button>
        </div>

        <div class="section">
            <h2>3. API Endpoint Tests</h2>
            <button onclick="testUserEndpoint()">Test /api/auth/user</button>
            <button onclick="testWalletsEndpoint()">Test /api/wallets</button>
            <button onclick="testProvidersEndpoint()">Test /api/auth/providers</button>
        </div>

        <div class="section">
            <h2>4. Manual Token Test</h2>
            <input type="text" id="manual-token" placeholder="Enter JWT token" style="width: 400px;">
            <button onclick="testManualToken()">Test Token</button>
        </div>

        <div class="section">
            <h2>5. Navigation Test</h2>
            <button onclick="goToDashboard()">Go to Dashboard</button>
            <button onclick="goToAdmin()">Go to Admin</button>
            <button onclick="goToLogin()">Go to Login</button>
        </div>

        <div class="section">
            <h2>6. Debug Log</h2>
            <button onclick="clearLog()">Clear Log</button>
            <div id="debug-log" class="log"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'info';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('debug-log').innerHTML = '';
        }

        function checkAuthStatus() {
            const token = localStorage.getItem('auth_token');
            const statusDiv = document.getElementById('auth-status');
            
            if (token) {
                statusDiv.innerHTML = `
                    <div class="success">✅ Token found in localStorage</div>
                    <div>Token: ${token.substring(0, 50)}...</div>
                `;
                log('Auth token found in localStorage', 'success');
                
                // Try to decode token payload (if it's a JWT)
                try {
                    const parts = token.split('.');
                    if (parts.length === 3) {
                        const payload = JSON.parse(atob(parts[1]));
                        log('JWT payload: ' + JSON.stringify(payload, null, 2), 'info');
                    }
                } catch (e) {
                    log('Token is not a JWT or cannot be decoded', 'warning');
                }
            } else {
                statusDiv.innerHTML = '<div class="error">❌ No token found in localStorage</div>';
                log('No auth token found', 'error');
            }
        }

        function clearAuth() {
            localStorage.removeItem('auth_token');
            log('Auth token cleared', 'warning');
            checkAuthStatus();
        }

        async function testUserEndpoint() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                log('No token available for user endpoint test', 'error');
                return;
            }

            try {
                log('Testing /api/auth/user endpoint...', 'info');
                const response = await fetch(`${API_BASE}/auth/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ User endpoint success: ' + JSON.stringify(data, null, 2), 'success');
                } else {
                    log('❌ User endpoint failed: ' + JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                log('❌ User endpoint error: ' + error.message, 'error');
            }
        }

        async function testWalletsEndpoint() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                log('No token available for wallets endpoint test', 'error');
                return;
            }

            try {
                log('Testing /api/wallets endpoint...', 'info');
                const response = await fetch(`${API_BASE}/wallets`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Wallets endpoint success: ' + JSON.stringify(data, null, 2), 'success');
                } else {
                    log('❌ Wallets endpoint failed: ' + JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                log('❌ Wallets endpoint error: ' + error.message, 'error');
            }
        }

        async function testProvidersEndpoint() {
            try {
                log('Testing /api/auth/providers endpoint...', 'info');
                const response = await fetch(`${API_BASE}/auth/providers`);
                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Providers endpoint success: ' + JSON.stringify(data, null, 2), 'success');
                } else {
                    log('❌ Providers endpoint failed: ' + JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                log('❌ Providers endpoint error: ' + error.message, 'error');
            }
        }

        async function testManualToken() {
            const token = document.getElementById('manual-token').value;
            if (!token) {
                log('Please enter a token to test', 'warning');
                return;
            }

            localStorage.setItem('auth_token', token);
            log('Token set in localStorage', 'info');
            await testUserEndpoint();
        }

        function simulateOAuthCallback() {
            const testUser = {
                id: 20,
                name: 'Ashenafi Ashu',
                email: 'ashenafi14264@gmail.com',
                avatar: null,
                is_admin: false
            };

            const testToken = 'test-token-' + Date.now();
            
            // Simulate the OAuth callback URL parameters
            const params = new URLSearchParams({
                auth_success: 'true',
                token: testToken,
                user: btoa(JSON.stringify(testUser))
            });

            log('Simulating OAuth callback with test data', 'info');
            log('Test user: ' + JSON.stringify(testUser, null, 2), 'info');
            
            // Set token in localStorage
            localStorage.setItem('auth_token', testToken);
            
            // Redirect to login with callback parameters
            window.location.href = `/login?${params.toString()}`;
        }

        function simulateAdminCallback() {
            const testUser = {
                id: 27,
                name: 'OAuth Test User',
                email: 'oauth.test@example.com',
                avatar: null,
                is_admin: true
            };

            const testToken = 'admin-token-' + Date.now();
            
            const params = new URLSearchParams({
                auth_success: 'true',
                token: testToken,
                user: btoa(JSON.stringify(testUser))
            });

            log('Simulating Admin OAuth callback', 'info');
            log('Admin user: ' + JSON.stringify(testUser, null, 2), 'info');
            
            localStorage.setItem('auth_token', testToken);
            window.location.href = `/login?${params.toString()}`;
        }

        function goToDashboard() {
            log('Navigating to dashboard...', 'info');
            window.location.href = '/dashboard';
        }

        function goToAdmin() {
            log('Navigating to admin panel...', 'info');
            window.location.href = '/admin';
        }

        function goToLogin() {
            log('Navigating to login...', 'info');
            window.location.href = '/login';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('OAuth Dashboard Debug Tool loaded', 'success');
            checkAuthStatus();
        });
    </script>
</body>
</html>
