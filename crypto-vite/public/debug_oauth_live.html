<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live OAuth Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; background: #2a2a2a; border-radius: 8px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196F3; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .log { height: 400px; overflow-y: auto; background: #333; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .status { padding: 10px; border-radius: 4px; margin: 10px 0; }
        .status.success { background: #1b5e20; }
        .status.error { background: #b71c1c; }
        .status.warning { background: #e65100; }
        pre { background: #333; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Live OAuth Debug Tool</h1>
        
        <div class="section">
            <h2>Current Status</h2>
            <div id="current-status"></div>
            <button onclick="checkCurrentStatus()">Refresh Status</button>
        </div>

        <div class="section">
            <h2>OAuth Flow Test</h2>
            <button onclick="startOAuthFlow()">Start Google OAuth</button>
            <button onclick="testDirectCallback()">Test Direct Callback</button>
            <button onclick="clearAllAuth()">Clear All Auth Data</button>
        </div>

        <div class="section">
            <h2>API Tests</h2>
            <button onclick="testBackendConnection()">Test Backend</button>
            <button onclick="testUserEndpoint()">Test User API</button>
            <button onclick="testWalletsEndpoint()">Test Wallets API</button>
        </div>

        <div class="section">
            <h2>Debug Log</h2>
            <button onclick="clearLog()">Clear Log</button>
            <div id="debug-log" class="log"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'info';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }

        function clearLog() {
            document.getElementById('debug-log').innerHTML = '';
        }

        function checkCurrentStatus() {
            const statusDiv = document.getElementById('current-status');
            const token = localStorage.getItem('auth_token');
            
            let statusHtml = '';
            
            if (token) {
                statusHtml += '<div class="status success">✅ Auth token found in localStorage</div>';
                statusHtml += `<pre>Token: ${token.substring(0, 50)}...</pre>`;
                log('Auth token found in localStorage', 'success');
            } else {
                statusHtml += '<div class="status error">❌ No auth token in localStorage</div>';
                log('No auth token found', 'error');
            }
            
            // Check URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const authSuccess = urlParams.get('auth_success');
            const userParam = urlParams.get('user');
            const tokenParam = urlParams.get('token');
            
            if (authSuccess || userParam || tokenParam) {
                statusHtml += '<div class="status warning">⚠️ OAuth callback parameters detected in URL</div>';
                statusHtml += `<pre>auth_success: ${authSuccess}\ntoken: ${tokenParam ? tokenParam.substring(0, 30) + '...' : 'null'}\nuser: ${userParam ? 'present' : 'null'}</pre>`;
                log('OAuth callback parameters found in URL', 'warning');
                
                if (userParam) {
                    try {
                        const userData = JSON.parse(atob(userParam));
                        statusHtml += '<div class="status info">ℹ️ User data decoded successfully</div>';
                        statusHtml += `<pre>${JSON.stringify(userData, null, 2)}</pre>`;
                        log('User data decoded: ' + JSON.stringify(userData), 'info');
                    } catch (e) {
                        statusHtml += '<div class="status error">❌ Failed to decode user data</div>';
                        log('Failed to decode user data: ' + e.message, 'error');
                    }
                }
            }
            
            statusDiv.innerHTML = statusHtml;
        }

        async function testBackendConnection() {
            log('Testing backend connection...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/providers`);
                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Backend connection successful', 'success');
                    log('Providers: ' + JSON.stringify(data, null, 2), 'info');
                } else {
                    log('❌ Backend connection failed: ' + response.status, 'error');
                }
            } catch (error) {
                log('❌ Backend connection error: ' + error.message, 'error');
            }
        }

        async function testUserEndpoint() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                log('No token available for user endpoint test', 'error');
                return;
            }

            log('Testing user endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ User endpoint success', 'success');
                    log('User data: ' + JSON.stringify(data, null, 2), 'info');
                } else {
                    log('❌ User endpoint failed: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                log('❌ User endpoint error: ' + error.message, 'error');
            }
        }

        async function testWalletsEndpoint() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                log('No token available for wallets endpoint test', 'error');
                return;
            }

            log('Testing wallets endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/wallets`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Wallets endpoint success', 'success');
                    log('Wallets: ' + JSON.stringify(data, null, 2), 'info');
                } else {
                    log('❌ Wallets endpoint failed: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                log('❌ Wallets endpoint error: ' + error.message, 'error');
            }
        }

        async function startOAuthFlow() {
            log('Starting OAuth flow...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/google?redirect_url=${encodeURIComponent(window.location.origin + '/debug_oauth_live.html')}`);
                const data = await response.json();
                
                if (data.success) {
                    log('✅ OAuth URL generated, redirecting...', 'success');
                    window.location.href = data.auth_url;
                } else {
                    log('❌ OAuth URL generation failed: ' + data.message, 'error');
                }
            } catch (error) {
                log('❌ OAuth flow error: ' + error.message, 'error');
            }
        }

        function testDirectCallback() {
            log('Testing direct OAuth callback...', 'info');
            
            const testUser = {
                id: 20,
                name: 'Ashenafi Ashu',
                email: 'ashenafi14264@gmail.com',
                avatar: 'https://lh3.googleusercontent.com/a/ACg8ocLLBpDDD4uncpFowm0NfaOkKca6iAdK2ME6kajLsayzpKRYkg=s96-c',
                is_admin: false
            };

            const testToken = '76|UvecNX85hw8VskK72LsES4ACN4CkkvZeyGkFlk6068d92bc4';
            
            // Set token in localStorage
            localStorage.setItem('auth_token', testToken);
            log('Token set in localStorage', 'info');
            
            // Simulate callback parameters
            const params = new URLSearchParams({
                auth_success: 'true',
                token: testToken,
                user: btoa(JSON.stringify(testUser))
            });

            log('Simulating OAuth callback with test data', 'info');
            log('Test user: ' + JSON.stringify(testUser, null, 2), 'info');
            
            // Update URL without reload
            const newUrl = window.location.pathname + '?' + params.toString();
            window.history.pushState({}, '', newUrl);
            
            // Check status
            checkCurrentStatus();
            
            log('✅ Direct callback simulation complete', 'success');
            log('You can now test the user endpoint or navigate to dashboard', 'info');
        }

        function clearAllAuth() {
            localStorage.removeItem('auth_token');
            sessionStorage.clear();
            
            // Clear URL parameters
            window.history.pushState({}, '', window.location.pathname);
            
            log('All auth data cleared', 'warning');
            checkCurrentStatus();
        }

        // Handle OAuth callback if present
        window.addEventListener('load', function() {
            log('Debug tool loaded', 'success');
            checkCurrentStatus();
            
            const urlParams = new URLSearchParams(window.location.search);
            const authSuccess = urlParams.get('auth_success');
            const token = urlParams.get('token');
            const userParam = urlParams.get('user');
            
            if (authSuccess === 'true' && token && userParam) {
                log('OAuth callback detected, processing...', 'info');
                
                try {
                    const userData = JSON.parse(atob(userParam));
                    localStorage.setItem('auth_token', token);
                    
                    log('✅ OAuth callback processed successfully', 'success');
                    log('User: ' + userData.name + ' (' + userData.email + ')', 'success');
                    log('Admin: ' + (userData.is_admin ? 'Yes' : 'No'), 'info');
                    
                    // Test the token immediately
                    setTimeout(testUserEndpoint, 1000);
                    
                } catch (error) {
                    log('❌ OAuth callback processing failed: ' + error.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
