<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Frontend Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin: 5px; cursor: pointer; border: none; }
        .btn:hover { background: #0056b3; }
        .btn.success { background: #28a745; }
        .btn.danger { background: #dc3545; }
        .result { margin: 10px 0; padding: 10px; border-radius: 3px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
        .code { background: #f8f9fa; padding: 10px; border-radius: 3px; font-family: monospace; white-space: pre-wrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Admin Dashboard Frontend Test</h1>
        
        <div class="test-section">
            <h3>Authentication Test</h3>
            <button onclick="testLogin()" class="btn">Test Admin Login</button>
            <button onclick="checkAuthStatus()" class="btn">Check Auth Status</button>
            <button onclick="clearAuth()" class="btn danger">Clear Auth</button>
            <div id="auth-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>API Endpoints Test</h3>
            <div class="grid">
                <div>
                    <button onclick="testDashboard()" class="btn">Test Dashboard API</button>
                    <button onclick="testAnalytics()" class="btn">Test Analytics API</button>
                    <button onclick="testUsers()" class="btn">Test Users API</button>
                </div>
                <div>
                    <button onclick="testAllEndpoints()" class="btn success">Test All Endpoints</button>
                </div>
            </div>
            <div id="api-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Frontend Navigation Test</h3>
            <a href="http://localhost:5174/login" target="_blank" class="btn">Login Page</a>
            <a href="http://localhost:5174/admin" target="_blank" class="btn">Admin Dashboard</a>
            <a href="http://localhost:5174/auth-test" target="_blank" class="btn">Auth Test</a>
            <div id="nav-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Current Status</h3>
            <div id="status-display" class="code">Click "Check Status" to see current state</div>
            <button onclick="checkStatus()" class="btn">Check Status</button>
        </div>
    </div>

    <script>
        let authToken = null;
        
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.className = `result ${type}`;
            element.innerHTML = message;
        }
        
        async function testLogin() {
            try {
                showResult('auth-result', 'Testing admin login...', 'info');
                
                const response = await fetch('http://127.0.0.1:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@cryptoexchange.com',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('auth_token', authToken);
                    showResult('auth-result', 
                        `✅ Login successful!<br>
                        User: ${data.user.name}<br>
                        Email: ${data.user.email}<br>
                        Is Admin: ${data.user.is_admin ? 'Yes' : 'No'}<br>
                        Token: ${authToken.substring(0, 20)}...`, 'success');
                } else {
                    showResult('auth-result', `❌ Login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult('auth-result', `❌ Login error: ${error.message}`, 'error');
            }
        }
        
        function checkAuthStatus() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                showResult('auth-result', 
                    `✅ Auth token found<br>
                    Token: ${token.substring(0, 20)}...<br>
                    Length: ${token.length} characters`, 'success');
            } else {
                showResult('auth-result', '❌ No auth token found', 'error');
            }
        }
        
        function clearAuth() {
            localStorage.removeItem('auth_token');
            authToken = null;
            showResult('auth-result', '🗑️ Authentication cleared', 'info');
        }
        
        async function testDashboard() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                showResult('api-result', '❌ No auth token. Please login first.', 'error');
                return;
            }
            
            try {
                showResult('api-result', 'Testing dashboard API...', 'info');
                
                const response = await fetch('http://127.0.0.1:8000/api/admin/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult('api-result', 
                        `✅ Dashboard API success!<br>
                        Total Users: ${data.data.stats.total_users}<br>
                        Total Deposits: $${data.data.stats.total_deposits}<br>
                        Recent Transactions: ${data.data.recent_transactions.length}`, 'success');
                } else {
                    showResult('api-result', `❌ Dashboard API failed: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult('api-result', `❌ Dashboard API error: ${error.message}`, 'error');
            }
        }
        
        async function testAnalytics() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                showResult('api-result', '❌ No auth token. Please login first.', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/admin/analytics', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult('api-result', 
                        `✅ Analytics API success!<br>
                        ${data.note ? 'Note: ' + data.note + '<br>' : ''}
                        Overview data: ${data.data.overview ? 'Available' : 'Not available'}`, 'success');
                } else {
                    showResult('api-result', `❌ Analytics API failed: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult('api-result', `❌ Analytics API error: ${error.message}`, 'error');
            }
        }
        
        async function testUsers() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                showResult('api-result', '❌ No auth token. Please login first.', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult('api-result', 
                        `✅ Users API success!<br>
                        Total Users: ${data.users.length}<br>
                        First User: ${data.users[0]?.name || 'N/A'}`, 'success');
                } else {
                    showResult('api-result', `❌ Users API failed: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult('api-result', `❌ Users API error: ${error.message}`, 'error');
            }
        }
        
        async function testAllEndpoints() {
            showResult('api-result', 'Testing all endpoints...', 'info');
            
            const results = [];
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                showResult('api-result', '❌ No auth token. Please login first.', 'error');
                return;
            }
            
            const endpoints = [
                { name: 'Dashboard', url: '/admin/dashboard' },
                { name: 'Analytics', url: '/admin/analytics' },
                { name: 'Users', url: '/admin/users' }
            ];
            
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`http://127.0.0.1:8000/api${endpoint.url}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    results.push(`${data.success ? '✅' : '❌'} ${endpoint.name}: ${response.status}`);
                } catch (error) {
                    results.push(`❌ ${endpoint.name}: ${error.message}`);
                }
            }
            
            showResult('api-result', results.join('<br>'), 'info');
        }
        
        function checkStatus() {
            const token = localStorage.getItem('auth_token');
            const status = {
                'Auth Token': token ? `Present (${token.length} chars)` : 'Missing',
                'Frontend URL': 'http://localhost:5174',
                'Backend URL': 'http://127.0.0.1:8000',
                'Admin Credentials': 'admin@cryptoexchange.com / admin123',
                'Timestamp': new Date().toLocaleString()
            };
            
            const statusText = Object.entries(status)
                .map(([key, value]) => `${key}: ${value}`)
                .join('\n');
                
            document.getElementById('status-display').textContent = statusText;
        }
        
        // Auto-check status on load
        window.onload = () => {
            checkStatus();
            checkAuthStatus();
        };
    </script>
</body>
</html>
