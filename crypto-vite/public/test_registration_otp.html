<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration with OTP Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #00e5cc, #00b4d8);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(135deg, #00e5cc, #00b4d8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 229, 204, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .step {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .step h3 {
            margin-top: 0;
            color: #333;
        }

        .otp-input {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Registration with OTP Test</h1>
            <p>Test the complete registration and OTP verification flow</p>
        </div>

        <div class="content">
            <!-- Step 1: Registration -->
            <div class="step">
                <h3>Step 1: User Registration</h3>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="name" value="Test User" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" value="ashenafiashew074@gmail.com" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" value="Password123!" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" id="password_confirmation" value="Password123!" placeholder="Confirm password">
                </div>
                <button class="btn" onclick="registerUser()">Register User</button>
                <div id="registerResult" class="result" style="display: none;"></div>
            </div>

            <!-- Step 2: OTP Generation -->
            <div class="step">
                <h3>Step 2: Generate OTP for Registration</h3>
                <button class="btn" onclick="generateRegistrationOtp()" id="generateOtpBtn" disabled>Generate OTP</button>
                <div id="otpResult" class="result" style="display: none;"></div>
            </div>

            <!-- Step 3: OTP Verification -->
            <div class="step">
                <h3>Step 3: Verify OTP</h3>
                <div class="form-group">
                    <label>Enter OTP Code:</label>
                    <input type="text" id="otpCode" class="otp-input" maxlength="6" placeholder="000000" disabled>
                </div>
                <button class="btn" onclick="verifyOtp()" id="verifyOtpBtn" disabled>Verify OTP</button>
                <div id="verifyResult" class="result" style="display: none;"></div>
            </div>

            <!-- Step 4: Check Email Verification Status -->
            <div class="step">
                <h3>Step 4: Check Email Verification Status</h3>
                <button class="btn" onclick="checkEmailStatus()" id="checkStatusBtn" disabled>Check Status</button>
                <div id="statusResult" class="result" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let authToken = null;
        let userEmail = null;

        // Show result
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `result ${type}`;
            element.style.display = 'block';
        }

        // Make API request
        async function makeRequest(method, endpoint, data = null) {
            const url = `${API_BASE}${endpoint}`;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            };

            if (authToken) {
                options.headers['Authorization'] = `Bearer ${authToken}`;
            }

            if (data) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                
                return {
                    success: response.ok,
                    status: response.status,
                    data: result
                };
            } catch (error) {
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        // Step 1: Register User
        async function registerUser() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const password_confirmation = document.getElementById('password_confirmation').value;

            if (!name || !email || !password || !password_confirmation) {
                showResult('registerResult', 'Please fill in all fields', 'error');
                return;
            }

            showResult('registerResult', 'Registering user...', 'info');

            const response = await makeRequest('POST', '/auth/register', {
                name,
                email,
                password,
                password_confirmation
            });

            if (response.success && response.data.success) {
                authToken = response.data.token;
                userEmail = email;
                
                const message = `Registration successful!
Token: ${authToken.substring(0, 20)}...
User ID: ${response.data.user.id}
Email: ${response.data.user.email}
Email Verified: ${response.data.user.email_verified_at ? 'Yes' : 'No'}`;
                
                showResult('registerResult', message, 'success');
                
                // Enable next step
                document.getElementById('generateOtpBtn').disabled = false;
                
            } else {
                const errorMsg = response.data.message || response.error || 'Registration failed';
                showResult('registerResult', `Registration failed: ${errorMsg}`, 'error');
            }
        }

        // Step 2: Generate OTP
        async function generateRegistrationOtp() {
            if (!authToken || !userEmail) {
                showResult('otpResult', 'Please register first', 'error');
                return;
            }

            showResult('otpResult', 'Generating OTP...', 'info');

            const response = await makeRequest('POST', '/auth/otp/generate', {
                identifier: userEmail,
                type: 'email',
                purpose: 'registration'
            });

            if (response.success && response.data.success) {
                let message = `OTP generated successfully!
Message: ${response.data.message}
Expires in: ${response.data.expires_in} seconds`;

                // Show development OTP if available
                if (response.data.otp_code) {
                    message += `\nDevelopment OTP: ${response.data.otp_code}`;
                    document.getElementById('otpCode').value = response.data.otp_code;
                }

                showResult('otpResult', message, 'success');
                
                // Enable OTP input and verify button
                document.getElementById('otpCode').disabled = false;
                document.getElementById('verifyOtpBtn').disabled = false;
                
            } else {
                const errorMsg = response.data.message || response.error || 'OTP generation failed';
                showResult('otpResult', `OTP generation failed: ${errorMsg}`, 'error');
            }
        }

        // Step 3: Verify OTP
        async function verifyOtp() {
            const otpCode = document.getElementById('otpCode').value;

            if (!otpCode || otpCode.length !== 6) {
                showResult('verifyResult', 'Please enter a valid 6-digit OTP', 'error');
                return;
            }

            if (!authToken || !userEmail) {
                showResult('verifyResult', 'Please register and generate OTP first', 'error');
                return;
            }

            showResult('verifyResult', 'Verifying OTP...', 'info');

            const response = await makeRequest('POST', '/auth/otp/verify', {
                identifier: userEmail,
                otp_code: otpCode,
                type: 'email',
                purpose: 'registration'
            });

            if (response.success && response.data.success) {
                const message = `OTP verified successfully!
Message: ${response.data.message}
Email verification completed!`;
                
                showResult('verifyResult', message, 'success');
                
                // Enable status check
                document.getElementById('checkStatusBtn').disabled = false;
                
            } else {
                const errorMsg = response.data.message || response.error || 'OTP verification failed';
                showResult('verifyResult', `OTP verification failed: ${errorMsg}`, 'error');
            }
        }

        // Step 4: Check Email Status
        async function checkEmailStatus() {
            if (!authToken) {
                showResult('statusResult', 'Please register first', 'error');
                return;
            }

            showResult('statusResult', 'Checking email verification status...', 'info');

            const response = await makeRequest('GET', '/auth/verification-status');

            if (response.success && response.data.success) {
                const data = response.data.data;
                const message = `Email Verification Status:
- Is Verified: ${data.is_verified ? 'Yes' : 'No'}
- Can Resend: ${data.can_resend ? 'Yes' : 'No'}
- Attempts Remaining: ${data.attempts_remaining || 'N/A'}
- Last Sent: ${data.verification_sent_at || 'Never'}`;
                
                showResult('statusResult', message, data.is_verified ? 'success' : 'info');
                
            } else {
                const errorMsg = response.data.message || response.error || 'Status check failed';
                showResult('statusResult', `Status check failed: ${errorMsg}`, 'error');
            }
        }

        // Auto-fill OTP input with numbers only
        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
        });
    </script>
</body>
</html>
