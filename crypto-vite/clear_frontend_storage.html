<!DOCTYPE html>
<html>
<head>
    <title>Clear Frontend Storage</title>
</head>
<body>
    <h1>Clear Frontend Storage</h1>
    <button onclick="clearStorage()">Clear All Storage</button>
    <div id="result"></div>

    <script>
        function clearStorage() {
            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            // Clear cookies (if any)
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            document.getElementById('result').innerHTML = '<p style="color: green;">✅ All storage cleared! You can now close this tab and try logging in again.</p>';
        }
        
        // Show current storage
        window.onload = function() {
            const authToken = localStorage.getItem('auth_token');
            document.getElementById('result').innerHTML = `
                <p>Current auth_token: ${authToken || 'None'}</p>
                <p>localStorage items: ${localStorage.length}</p>
                <p>sessionStorage items: ${sessionStorage.length}</p>
            `;
        }
    </script>
</body>
</html>
