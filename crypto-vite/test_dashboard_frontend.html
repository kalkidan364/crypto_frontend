<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Test</title>
</head>
<body>
    <h1>Dashboard API Test</h1>
    <button onclick="testDashboard()">Test Dashboard API</button>
    <div id="result"></div>

    <script>
        async function testDashboard() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                // First login
                const loginResponse = await fetch('http://127.0.0.1:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@cryptoexchange.com',
                        password: 'admin123'
                    })
                });

                const loginData = await loginResponse.json();
                console.log('Login response:', loginData);

                if (!loginData.success) {
                    resultDiv.innerHTML = 'Login failed: ' + loginData.message;
                    return;
                }

                // Then test dashboard
                const dashboardResponse = await fetch('http://127.0.0.1:8000/api/admin/dashboard', {
                    headers: {
                        'Authorization': 'Bearer ' + loginData.token,
                        'Accept': 'application/json'
                    }
                });

                const dashboardData = await dashboardResponse.json();
                console.log('Dashboard response:', dashboardData);

                resultDiv.innerHTML = '<pre>' + JSON.stringify(dashboardData, null, 2) + '</pre>';

            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
